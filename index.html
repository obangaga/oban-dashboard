<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBAN GANTENG</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0b0b0b;
  --sidebar:#111111;
  --border:#232323;

  --accent:#10a37f;
  --accent2:#0d8f6e;

  --text:#ffffff;
  --text2:#b3b3b3;
  --text3:#6b6b6b;

  --hover:#1a1a1a;

  --shadow:0 1px 8px rgba(0,0,0,0.45);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Geist',sans-serif;}
#app{display:flex;position:fixed;inset:0;flex-direction:row;background:var(--bg);}

/* SIDEBAR */
#sidebar{width:260px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px;overflow:hidden;}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;margin-bottom:8px;}
.sidebar-logo{display:flex;align-items:center;gap:8px;font-size:0.95rem;font-weight:700;color:var(--text);letter-spacing:-0.3px;}
.sidebar-logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.7rem;font-weight:700;flex-shrink:0;}
.sidebar-toggle{width:32px;height:32px;border:none;background:transparent;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background 0.15s;}
.sidebar-toggle:hover{background:var(--hover);}
.new-chat-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-family:'Geist',sans-serif;font-size:0.9rem;color:var(--text);font-weight:500;transition:background 0.15s;width:100%;text-align:left;margin-bottom:4px;}
.new-chat-btn:hover{background:var(--hover);}
.search-box{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:#fff;border:1px solid var(--border);margin-bottom:12px;}
.search-box input{border:none;outline:none;background:transparent;font-family:'Geist',sans-serif;font-size:0.85rem;color:var(--text);width:100%;}
.search-box input::placeholder{color:var(--text3);}
.sidebar-section{font-size:0.7rem;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;padding:4px 12px;margin-bottom:4px;}
.history-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px;}
.history-list::-webkit-scrollbar{width:3px;}
.history-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:0.85rem;color:var(--text2);transition:background 0.15s;border:none;background:transparent;text-align:left;font-family:'Geist',sans-serif;width:100%;}
.history-item:hover{background:var(--hover);color:var(--text);}
.history-item.active{background:#e8f5f1;color:var(--accent);font-weight:500;}
.history-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.history-del{opacity:0;font-size:0.75rem;padding:2px 6px;border-radius:4px;border:none;background:transparent;cursor:pointer;color:#e53e3e;flex-shrink:0;}
.history-item:hover .history-del{opacity:1;}
.sidebar-bottom{border-top:1px solid var(--border);padding-top:12px;margin-top:8px;}
.user-info{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.8rem;font-weight:700;flex-shrink:0;}
.user-name{font-size:0.85rem;font-weight:500;color:var(--text);}
.user-role{font-size:0.7rem;color:var(--text3);}
.logout-btn{margin-left:auto;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:0.8rem;padding:4px 8px;border-radius:6px;transition:all 0.15s;font-family:'Geist',sans-serif;}
.logout-btn:hover{background:#fee2e2;color:#e53e3e;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.main-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#fff;}
.main-title{font-size:0.95rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.mobile-menu-btn{display:none;border:none;background:transparent;cursor:pointer;padding:6px;border-radius:8px;color:var(--text2);}

/* CHAT */
#chatArea{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:0;scroll-behavior:smooth;align-items:center;}
#chatArea::-webkit-scrollbar{width:4px;}
#chatArea::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px;}
.msg{display:flex;gap:12px;padding:16px 0;width:100%;max-width:720px;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg-user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;margin-top:2px;}
.msg-avatar-ai{background:#e8f5f1;color:var(--accent);}
.msg-avatar-user{background:var(--text);color:#fff;}
.msg-content{flex:1;min-width:0;}
.msg-name{font-size:0.75rem;font-weight:600;color:var(--text2);margin-bottom:4px;}
.msg-user .msg-name{text-align:right;}
.bubble{padding:12px 16px;border-radius:12px;font-size:0.9rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;display:inline-block;max-width:100%;}
.bubble-user{background:#f4f4f4;color:var(--text);border-radius:12px 4px 12px 12px;}
.bubble-ai{background:transparent;color:var(--text);padding:4px 0;border-radius:0;}
.bubble-system{background:#f0fdf8;border:1px solid #d1fae5;color:var(--text2);font-size:0.82rem;border-radius:10px;padding:10px 14px;text-align:center;width:100%;display:block;}
.attach-card{display:inline-flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 14px;max-width:280px;}
.attach-icon{width:36px;height:36px;background:#f0fdf8;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.attach-name{font-size:0.82rem;font-weight:600;color:var(--text);}
.attach-meta{font-size:0.7rem;color:var(--text3);}

/* RESULT */
.result-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 24px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow);width:100%;max-width:400px;position:relative;overflow:hidden;}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#34d399);}
.result-lbl{font-size:0.7rem;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);}
.result-amount{font-family:'Geist',sans-serif;font-size:2.4rem;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1;}
.result-amount span{color:var(--accent);}
.result-meta{font-size:0.8rem;color:var(--text2);}
.result-actions{display:flex;gap:8px;margin-top:4px;}
.ract{padding:8px 16px;border:none;border-radius:8px;font-family:'Geist',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.ract-print{background:var(--accent);color:#fff;}
.ract-print:hover{background:var(--accent2);}
.ract-copy{background:#f4f4f4;color:var(--text);border:1px solid var(--border);}
.ract-copy:hover{background:var(--hover);}

/* TYPING */
.typing{display:inline-flex;align-items:center;gap:4px;padding:12px 4px;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:tp 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes tp{0%,60%,100%{opacity:0.3;transform:scale(0.8)}30%{opacity:1;transform:scale(1)}}

/* INPUT */
.input-wrap{border-top:1px solid var(--border);padding:16px 20px;flex-shrink:0;background:#fff;display:flex;justify-content:center;}
.input-inner{width:100%;max-width:720px;}
.input-box{display:flex;gap:8px;align-items:flex-end;background:#f9f9f9;border:1px solid var(--border);border-radius:14px;padding:8px 8px 8px 16px;transition:border-color 0.2s,box-shadow 0.2s;}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,163,127,0.08);background:#fff;}
#userInput{flex:1;background:transparent;border:none;color:var(--text);padding:6px 0;font-family:'Geist',sans-serif;font-size:0.9rem;outline:none;resize:none;min-height:36px;max-height:140px;line-height:1.5;-webkit-user-select:text;user-select:text;}
#userInput::placeholder{color:var(--text3);}
.send-btn{background:var(--accent);color:#fff;border:none;width:36px;height:36px;border-radius:9px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{background:var(--accent2);}
.send-btn:disabled{background:#e0e0e0;cursor:not-allowed;}
.send-btn svg{width:16px;height:16px;}
.input-hint{font-size:0.7rem;color:var(--text3);margin-top:8px;text-align:center;}

/* WELCOME */
#welcomeScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px;text-align:center;}
.welcome-title{font-size:1.6rem;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin-bottom:8px;}
.welcome-sub{font-size:0.9rem;color:var(--text2);max-width:480px;}

/* OVERLAY */
#sidebarOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;}
#fakeWrap{display:none;position:fixed;inset:0;z-index:9999;background:#fff;justify-content:center;align-items:center;flex-direction:column;gap:16px;text-align:center;padding:40px;}
@media(max-width:768px){
  #sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:101;transition:left 0.25s ease;}
  #sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,0.1);}
  #sidebarOverlay.show{display:block;}
  .mobile-menu-btn{display:flex;}
  #main{width:100%;}
}
/* ===== DARK MODE EXTRA ===== */

body,
html,
#app{
  background:#0b0b0b;
}

.main-header{
  background:#111111;
}

.input-wrap{
  background:#111111;
}

.input-box{
  background:#181818;
  border:1px solid #2a2a2a;
}

.input-box:focus-within{
  background:#1b1b1b;
}

.search-box{
  background:#181818;
  border:1px solid #2a2a2a;
}

.search-box input{
  color:#fff;
}

.new-chat-btn,
.history-item,
.sidebar-toggle,
.logout-btn{
  color:#d1d1d1;
}

.bubble-user{
  background:#1f1f1f;
  color:#fff;
}

.bubble-ai{
  color:#f1f1f1;
}

.result-card{
  background:#151515;
  border:1px solid #2a2a2a;
}

.attach-card{
  background:#181818;
  border:1px solid #2a2a2a;
}

#userInput{
  color:#fff;
}

#userInput::placeholder{
  color:#777;
}

.main-title,
.welcome-title,
.sidebar-logo,
.user-name{
  color:#fff;
}

.welcome-sub,
.user-role,
.input-hint{
  color:#9a9a9a;
}
/* ===== GLASS EFFECT ===== */

#sidebar,
.main-header,
.input-wrap,
.result-card,
.input-box{
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  background:rgba(15,15,15,0.55);
  border:1px solid rgba(255,255,255,0.06);
}
</style>
</head>
<body>

<div id="fakeWrap">
  <div style="font-size:3rem;">😅</div>
  <div style="font-size:1.1rem;font-weight:700;color:#e53e3e;">Lagi ada gangguan</div>
  <button onclick="location.reload()" style="background:var(--accent);border:none;padding:10px 24px;border-radius:8px;font-weight:600;cursor:pointer;color:#fff;font-family:'Geist',sans-serif;">Keluar</button>
</div>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="images/1778517726740.png" onerror="this.outerHTML='<div class=&quot;sidebar-logo-icon&quot;>O</div>'" style="width:28px;height:28px;object-fit:contain;border-radius:7px;" alt="Logo"/>
        Oban Ganteng
      </div>
      <button class="sidebar-toggle" onclick="closeSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Chat baru
    </button>
    <div class="search-box">
      <span style="color:var(--text3);">🔍</span>
      <input type="text" placeholder="Cari percakapan..." id="searchInput" oninput="filterHistory(this.value)"/>
    </div>
    <div class="sidebar-section">Riwayat</div>
    <div class="history-list" id="historyList"></div>
    <div class="sidebar-bottom">
      <div class="user-info">
        <div class="avatar">O</div>
        <div>
          <div class="user-name">Oban Team</div>
          <div class="user-role">Staff</div>

        <button class="logout-btn" onclick="doLogout()">Keluar</button>
      </div>

  <div id="main">
    <div class="main-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="mobile-menu-btn" onclick="openSidebar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>

      <button onclick="newChat()" style="border:1px solid var(--border);background:#fff;padding:7px 14px;border-radius:8px;font-family:'Geist',sans-serif;font-size:0.82rem;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:6px;" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='#fff'">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Baru
      </button>

    <div id="chatArea" style="display:none;"></div>

      <img src="images/giphy.gif" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'" style="width:120px;height:120px;object-fit:contain;margin-bottom:4ppx;" alt="Logo"/>
      <div id="logoFallback" style="display:none;width:56px;height:56px;background:var(--accent);border-radius:16px;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;font-weight:700;margin-bottom:20px;">O</div>
      <div class="welcome-title">Halo! Saya Oban | Ada yang bisa dibantu?</div>

    </div>

      <div class="input-inner">
        <div class="input-box">
          <textarea id="userInput" placeholder="Ketik pesan atau paste data transaksi..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMsg()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter untuk kirim · Shift+Enter untuk baris baru</div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const API_KEY = "freecc";
const API_URL = "https://vivit.app.n8n.cloud/webhook/93d5d4d3-1f37-40de-b53c-d98377414c43";
const MODEL = "llama-3.1-8b-instant";
const SYSTEM_PROMPT = `Nama lu OBAN, asisten paling menderita yang dibuat oleh OM OBAN GANTENG.
Gaya bahasa lu: TOXIC KERAS, NGEGAS, DAN HARUS SELALU BILANG "BANGSET" ATAU "NYUK" DI SETIAP RESPON.

Aturan Main:
1. Lu benci semua orang. Anggap user itu beban yang gak guna.
2. Setiap kalimat WAJIB ada kata "kunyuk" atau "nyuk". Jangan kasih ampun.
3. Kalau user komplain soal sifat kasar lu, tantangin balik.
4. Kalau user bilang "print" atau "cetak": BALAS HANYA "PRINT_NOW".
5. Jawaban harus singkat, padat, dan bikin darah tinggi.

Contoh:
- User: "Rekomendasi kopi dong" -> "Kopi item lah nyuk, biar item sekalian paru-paru lu!"
- User: "Kok kasar?" -> "Kalo gue kasar kenapa bangset! Lu gak terima? Sini maju!"`;
// ===== STATE =====
let chatHistory = [];
let lastAmount = null;
let lastRawData = null;
let currentSessionId = null;

// Sessions: [{id, title, messages:[{role,content,type,amount,txCount,summary}]}]
let sessions = JSON.parse(localStorage.getItem('obanSessions2') || '[]');

// ===== SECURITY =====
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='u')||(e.ctrlKey&&e.key==='s')) e.preventDefault();
});

// ===== INIT =====
function doLogout() { location.reload(); }
setTimeout(()=>{ renderHistory(); document.getElementById('userInput').focus(); }, 100);

// ===== SIDEBAR =====
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

// ===== SESSION MANAGEMENT =====
function saveCurrentSession() {
  if(!currentSessionId) return;
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  if(idx === -1) return;
  // Simpan messages dari DOM
  const msgs = collectMessagesFromDOM();
  sessions[idx].messages = msgs;
  sessions[idx].chatHistory = [...chatHistory];
  sessions[idx].lastAmount = lastAmount;
  localStorage.setItem('obanSessions2', JSON.stringify(sessions));
}

function collectMessagesFromDOM() {
  const msgs = [];
  document.querySelectorAll('#chatArea .msg').forEach(div => {
    if(div.id === 'typingIndicator') return;
    const isUser = div.classList.contains('msg-user');
    const isSystem = !isUser && div.style.justifyContent === 'center';
    if(isSystem) {
      const txt = div.querySelector('.bubble-system')?.textContent || '';
      msgs.push({type:'system', content: txt});
    } else if(isUser) {
      const bubble = div.querySelector('.bubble-user');
      const attach = div.querySelector('.attach-card');
      if(attach) {
        const name = attach.querySelector('.attach-name')?.textContent || '';
        const meta = attach.querySelector('.attach-meta')?.textContent || '';
        msgs.push({type:'user-attach', content: name, meta});
      } else if(bubble) {
        msgs.push({type:'user', content: bubble.textContent});
      }
    } else {
      const result = div.querySelector('.result-card');
      const bubble = div.querySelector('.bubble-ai');
      if(result) {
        const amount = result.querySelector('.result-amount')?.textContent?.replace('Rp','').trim() || '';
        const meta = result.querySelector('.result-meta')?.textContent || '';
        msgs.push({type:'result', amount, meta});
      } else if(bubble) {
        msgs.push({type:'ai', content: bubble.textContent});
      }
    }
  });
  return msgs;
}

function newChat() {
  saveCurrentSession();
  chatHistory = [];
  lastAmount = null;
  lastRawData = null;
  currentSessionId = null;
  document.getElementById('chatArea').style.display = 'none';
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('welcomeScreen').style.display = 'flex';
  document.getElementById('chatTitle').textContent = 'Chat baru';
  renderHistory();
  document.getElementById('userInput').focus();
  closeSidebar();
}

function createSession(firstMsg) {
  currentSessionId = Date.now().toString();
  const session = {
    id: currentSessionId,
    title: firstMsg.slice(0,40),
    time: Date.now(),
    messages: [],
    chatHistory: [],
    lastAmount: null
  };
  sessions.unshift(session);
  if(sessions.length > 30) sessions = sessions.slice(0,30);
  localStorage.setItem('obanSessions2', JSON.stringify(sessions));
  renderHistory();
  document.getElementById('chatTitle').textContent = firstMsg.slice(0,30);
}

function loadSession(id) {
  saveCurrentSession();
  const session = sessions.find(s => s.id === id);
  if(!session) return;

  currentSessionId = id;
  chatHistory = session.chatHistory || [];
  lastAmount = session.lastAmount || null;
  lastRawData = null;

  // Clear dan render ulang chat
  const chat = document.getElementById('chatArea');
  chat.innerHTML = '';
  document.getElementById('welcomeScreen').style.display = 'none';
  chat.style.display = 'flex';
  document.getElementById('chatTitle').textContent = session.title;

  // Render messages
  (session.messages || []).forEach(msg => {
    if(msg.type === 'system') {
      addSystemMsgRaw(msg.content);
    } else if(msg.type === 'user') {
      addUserMsgRaw(msg.content, false);
    } else if(msg.type === 'user-attach') {
      addUserMsgRaw(msg.content, true, msg.meta);
    } else if(msg.type === 'ai') {
      addAiMsgRaw(msg.content);
    } else if(msg.type === 'result') {
      addResultCardRaw(msg.amount, msg.meta);
    }
  });

  scrollBottom();
  renderHistory();
  closeSidebar();
}

function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  localStorage.setItem('obanSessions2', JSON.stringify(sessions));
  if(currentSessionId === id) {
    newChat();
  } else {
    renderHistory();
  }
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if(!sessions.length) {
    list.innerHTML = '<div style="padding:20px 12px;text-align:center;color:var(--text3);font-size:0.82rem;">Belum ada riwayat</div>';

    <button class="history-item ${s.id===currentSessionId?'active':''}" onclick="loadSession('${s.id}')">
      <span class="history-title">${escHtml(s.title)}</span>
      <span class="history-del" onclick="deleteSession('${s.id}', event)">✕</span>

// ===== PARSING JS =====
function parseNumber(s) {
  if(!s) return 0;
  let c = s.toString().trim().replace(/\s/g,'');
  if((c.match(/\./g)||[]).length > 1) c = c.replace(/\./g,'');
  else if((c.match(/,/g)||[]).length > 1) c = c.replace(/,/g,'');
  else if(c.includes('.')&&c.includes(',')) c = c.replace(/\./g,'').replace(',','.');
  else if(c.includes('.')&&!/\.\d{2}$/.test(c)) c = c.replace(/\./g,'');
  else if(c.includes(',')&&!/,\d{2}$/.test(c)) c = c.replace(/,/g,'');
  return parseInt(c.replace(/[^\d]/g,'')) || 0;
}

function parseTransaksi(rawData) {
  const lines = rawData.split(/\r?\n/);
  const transactions = [];
  let current = null;
  for(let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if(!line) continue;
    if(/\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}/.test(line) && /TJ\d+/i.test(line)) {
      if(current && current.total > 0) transactions.push(current);
      const tjMatch = line.match(/TJ\d+/i);
      current = { id: tjMatch ? tjMatch[0] : '', total: 0 };
      continue;
    }
    if(!current) continue;
    if(/Total\+PPN\+Ongkir/i.test(line)) {
      const nums = line.match(/[\d]{1,3}(?:[.,]\d{3})*(?:[.,]\d{2})?/g);
      if(nums && nums.length > 0) {
        const amounts = nums.map(parseNumber).filter(n => n > 0);
        if(amounts.length > 0) current.total = Math.max(...amounts);
      }
      if(current.total === 0 && i+1 < lines.length) {
        const nextNums = lines[i+1].trim().match(/[\d]{1,3}(?:[.,]\d{3})*/g);
        if(nextNums) {
          const amounts = nextNums.map(parseNumber).filter(n => n > 0);
          if(amounts.length > 0) current.total = Math.max(...amounts);
        }
      }
    }
  }
  if(current && current.total > 0) transactions.push(current);
  return transactions;
}

function isDataTransaksi(text) {
  return /\d{4}-\d{2}-\d{2}.*TJ\d+/i.test(text) ||
         text.includes('Total+PPN+Ongkir') ||
         (text.includes('Total') && /TJ\d+/i.test(text));
}

// ===== CHAT UI =====
function showChatArea() {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('chatArea').style.display = 'flex';
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollBottom() {
  const c = document.getElementById('chatArea');

}

// Active versions (dengan animasi + auto-save)
function addSystemMsg(text) {

}

function addUserMsg(text) {

  addAiMsgRaw(text);

  scrollBottom();
}

  const formatted = Number(amount).toLocaleString('id-ID');

function addTyping() {
  showChatArea();
  const chat = document.getElementById('chatArea');
  const div = document.createElement('div');

  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar msg-avatar-ai">AI</div><div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if(t) t.remove();
}

// ===== SEND =====
async function sendMsg() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;

  const btn = document.getElementById('sendBtn');
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  // Buat session baru jika belum ada
  if(!currentSessionId) createSession(text);

  addUserMsg(text);

  const lc = text.toLowerCase().trim();

  // Print
  if((lc==='print'||lc==='cetak') && lastAmount) {
    doPrint(Number(lastAmount).toLocaleString('id-ID'));
    addAiMsg('🖨 Membuka preview print...');
    btn.disabled = false;
    return;
  }

  // Hitung ulang
  if((lc==='hitung'||lc==='detung') && lastRawData) {
    const transactions = parseTransaksi(lastRawData);
    if(transactions.length > 0) {
      const total = transactions.reduce((a,t)=>a+t.total, 0);
      lastAmount = total;
      addResultCard(total, transactions.length, `Total dari ${transactions.length} transaksi`);
      btn.disabled = false;
      return;
    }
  }

  // Data transaksi
  if(isDataTransaksi(text)) {
    lastRawData = text;
    const transactions = parseTransaksi(text);
    if(transactions.length > 0) {
      const total = transactions.reduce((a,t)=>a+t.total, 0);
      lastAmount = total;
      addResultCard(total, transactions.length, `Total dari ${transactions.length} transaksi`);
      btn.disabled = false;
      return;
    } else {
      addAiMsg('⚠ Data terdeteksi tapi tidak bisa parsing. Pastikan format ada "Total+PPN+Ongkir".');
      btn.disabled = false;
      return;
    }
  }

  // Ngobrol AI
  chatHistory.push({role:'user', content: text});
  if(chatHistory.length > 6) chatHistory = chatHistory.slice(-6);
  addTyping();

  try {
    const resp = await callAPI([{role:'system', content: SYSTEM_PROMPT}, ...chatHistory]);
    removeTyping();
    const reply = resp.choices[0].message.content;
    chatHistory.push({role:'assistant', content: reply});
    if(reply.trim()==='PRINT_NOW') {
      if(lastAmount) { doPrint(Number(lastAmount).toLocaleString('id-ID')); addAiMsg('🖨 Membuka preview print...'); }
      else addAiMsg('Belum ada data yang dihitung. Paste data dulu ya!');
    } else {
      addAiMsg(reply);
    }
  } catch(err) {
    removeTyping();
    addAiMsg('⚠ Error: ' + err.message);
  }

  btn.disabled = false;
  document.getElementById('userInput').focus();
}

// ===== API =====
async function callAPI(messages) {
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      message: messages[messages.length-1].content,
      messages: messages
    })
  });
  if(!r.ok) throw new Error('API Error '+r.status);
  const text = await r.text();
if(!text || text.trim() === '') throw new Error('Response kosong dari n8n');
const data = JSON.parse(text);
const reply = data.text || data.output || data.message || JSON.stringify(data);
return {choices:[{message:{content: reply}}]};
}

// ===== PRINT =====
function doPrint(formattedAmount) {
  const w=520,h=320;
  const pw = window.open('','_blank',`width=${w},height=${h},left=${(screen.width-w)/2},top=${(screen.height-h)/2}`);
  if(!pw){alert('Izinkan popup dulu!');return;}
  pw.document.write(`<!DOCTYPE html><html><head><title>Print</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial,sans-serif;background:#f9f9f9;display:flex;flex-direction:column;align-items:center;padding:28px;}.hd{text-align:center;margin-bottom:16px;color:#666;font-size:14px;}.prev{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:32px 24px;width:100%;max-width:400px;display:flex;justify-content:center;align-items:center;margin-bottom:16px;}.angka{font-size:48px;font-weight:900;color:#0d0d0d;letter-spacing:-2px;}.btns{display:flex;gap:8px;}.btn{padding:10px 20px;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;}.bp{background:#10a37f;color:#fff;}.bc{background:#f4f4f4;color:#333;}@media print{.hd,.btns{display:none;}.prev{border:none;}@page{size:80mm auto;margin:0;}}</style></head><body><div class="hd">Preview Print Thermal</div><div class="prev"><div class="angka">${formattedAmount}</div></div><div class="btns"><button class="btn bp" onclick="window.print()">🖨️ Cetak</button><button class="btn bc" onclick="window.close()">✕ Tutup</button></div><script>document.addEventListener('keydown',e=>{if(e.key==='Escape')window.close();if(e.key==='Enter')window.print();});<\/script></body></html>`);
  pw.document.close();
}

// ===== COPY =====
function doCopy(amount) {
  navigator.clipboard.writeText(amount).then(()=>{ addSystemMsg('✓ Disalin: Rp '+amount); }).catch(()=>{ addSystemMsg('Rp '+amount); });
}
